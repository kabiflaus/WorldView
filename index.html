<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Eigenes CSS -->
    <link rel="stylesheet" href="css/style.css" />
     <!-- Bezier Kurven  -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-curve@0.1.0/leaflet.curve.js"></script>
</head>
<header id="header">
    <span class="logo">WORLD<em>·</em>VIEW</span>
</header>

<body>

    <div id="map"></div>

    <div id="map-controls">
    <button id="btn-oil" class="map-btn" onclick="toggleOilRoutes()">🛢 Öl-Routen</button>
</div>

    <div id="panel">
        <div class="ph">
            <div class="ph-left">
                <div class="ph-flag" id="p-flag"></div>
                <div class="ph-name" id="p-name"></div>
                <div class="ph-capital" id="p-cap"></div>
            </div>
            <div class="ph-actions">
                <button class="ph-btn close-btn" onclick="closePanel()">✕</button>
            </div>
        </div>
        <div id="p-econ"></div>
    </div>


    <!-- Eigenes JS -->
    <script src="js/map.js"></script>

</body>
<div id="footer">
    <div id="ticker">WORLD VIEW · Geopolitische Echtzeit-Daten · Mehr Features in Kürze</div>
</div>

</html>
